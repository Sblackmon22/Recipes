<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Recipes">
<meta name="theme-color" content="#ffffff">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<title>Recipe Book</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f0;color:#1a1a1a;display:flex;flex-direction:column}
.topbar{display:flex;align-items:center;gap:12px;padding:12px 16px;background:#fff;border-bottom:1px solid #e5e5e0;flex-shrink:0}
.menu-btn{display:none;background:none;border:none;font-size:24px;cursor:pointer;color:#1a1a1a;padding:2px 6px;line-height:1;flex-shrink:0;min-width:36px;min-height:36px;align-items:center;justify-content:center}
.topbar-title{font-size:15px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.app{display:flex;flex:1;overflow:hidden;min-height:0}
.sidebar{width:280px;background:#fff;border-right:1px solid #e5e5e0;display:flex;flex-direction:column;flex-shrink:0;overflow:hidden;transition:transform .25s ease}
.sidebar-header{padding:14px 16px 10px;border-bottom:1px solid #e5e5e0;display:flex;align-items:center;justify-content:space-between}
.sidebar-header h1{font-size:16px;font-weight:600}
.sidebar-header p{font-size:11px;color:#888;margin-top:1px}
.close-sidebar-btn{display:none;background:none;border:none;font-size:22px;cursor:pointer;color:#555;padding:4px;line-height:1;min-width:36px;min-height:36px}
.search-box{margin:10px 12px 6px;position:relative}
.search-box input{width:100%;padding:8px 10px 8px 30px;border:1px solid #e5e5e0;border-radius:8px;font-size:16px;background:#f9f9f6;outline:none;-webkit-appearance:none}
.search-box input:focus{border-color:#999;background:#fff}
.search-icon{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:#999;font-size:14px}
.cat-scroll{overflow-x:auto;padding:0 12px 8px;-webkit-overflow-scrolling:touch}
.cat-scroll::-webkit-scrollbar{height:3px}
.cat-scroll::-webkit-scrollbar-thumb{background:#ddd;border-radius:3px}
.cat-tabs{display:flex;gap:5px;width:max-content}
.cat-tab{padding:5px 11px;border-radius:12px;font-size:12px;border:none;cursor:pointer;background:#f0f0eb;color:#555;transition:all .15s;white-space:nowrap;-webkit-appearance:none}
.cat-tab.active{background:#1a1a1a;color:#fff}
.recipe-list{flex:1;overflow-y:auto;padding:6px 0;-webkit-overflow-scrolling:touch}
.recipe-item{display:flex;align-items:center;gap:10px;padding:9px 14px;cursor:pointer;border-left:3px solid transparent;transition:background .1s}
.recipe-item:hover,.recipe-item:active{background:#f5f5f0}
.recipe-item.active{background:#f0f0eb;border-left-color:#1a1a1a}
.recipe-icon{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.recipe-item-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.recipe-item-cat{font-size:11px;color:#888}
.main{flex:1;overflow-y:auto;background:#f5f5f0;-webkit-overflow-scrolling:touch}
.recipe-view{max-width:660px;margin:0 auto;padding:20px 16px 60px}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;color:#888;text-align:center;padding:40px}
.empty-icon{font-size:48px;margin-bottom:16px;opacity:.3}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:25}

/* RECIPE CONTENT */
.recipe-header{margin-bottom:18px}
.recipe-title{font-size:22px;font-weight:600;margin-bottom:4px}
.recipe-desc{font-size:14px;color:#555;line-height:1.5;margin-bottom:12px}
.recipe-meta{display:flex;gap:6px;flex-wrap:wrap}
.meta-pill{display:flex;align-items:center;gap:4px;padding:4px 10px;border-radius:20px;background:#fff;border:1px solid #e5e5e0;font-size:12px;color:#444}
.meta-pill span{font-weight:500}
.section-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.section-card{background:#fff;border:1px solid #e5e5e0;border-radius:10px;overflow:hidden}
.section-card.full{grid-column:1/-1}
.section-toggle{width:100%;padding:12px 14px;display:flex;align-items:center;justify-content:space-between;background:none;border:none;cursor:pointer;text-align:left;transition:background .1s;-webkit-appearance:none}
.section-toggle:hover,.section-toggle:active{background:#f9f9f6}
.section-toggle-left{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:500}
.section-toggle-icon{font-size:16px}
.chevron{font-size:14px;color:#999;transition:transform .2s;display:inline-block}
.chevron.open{transform:rotate(180deg)}
.section-body{padding:0 14px 14px;display:none;border-top:1px solid #f0f0eb}
.section-body.open{display:block}
.ing-table{width:100%;border-collapse:collapse;margin-top:10px;table-layout:fixed}
.ing-table th{font-size:11px;color:#888;font-weight:500;text-align:left;padding:4px 0;border-bottom:1px solid #f0f0eb}
.ing-table td{font-size:13px;padding:5px 0;border-bottom:1px solid #f8f8f5;vertical-align:top;word-break:break-word}
.ing-table td:first-child{color:#666;width:36%;font-size:12px;padding-right:8px}
.ing-group{font-size:11px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.05em;padding:10px 0 4px;border-bottom:1px solid #f0f0eb}
.steps-list{margin-top:10px;display:flex;flex-direction:column;gap:10px}
.step{display:flex;gap:10px;align-items:flex-start}
.step-num{width:22px;height:22px;border-radius:50%;background:#1a1a1a;color:#fff;font-size:11px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px}
.step-text{font-size:13px;line-height:1.6;color:#333}
.tips-list{margin-top:10px;display:flex;flex-direction:column;gap:7px}
.tip{font-size:13px;color:#333;line-height:1.5;padding-left:14px;position:relative}
.tip::before{content:'•';position:absolute;left:0;color:#999}
.tools-grid{margin-top:10px;display:grid;grid-template-columns:1fr 1fr;gap:4px}
.tool-item{font-size:12px;color:#444;padding:3px 0}
.macro-row{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:10px}
.macro-cell{background:#f9f9f6;border-radius:8px;padding:8px 6px;text-align:center}
.macro-val{font-size:15px;font-weight:600}
.macro-lbl{font-size:10px;color:#888;margin-top:2px}
.ref-link{display:inline-flex;align-items:center;gap:4px;font-size:12px;color:#555;margin-top:8px;text-decoration:none}
.method-tabs{display:flex;gap:6px;margin-top:10px;margin-bottom:8px}
.method-tab{padding:5px 12px;border-radius:8px;font-size:12px;border:1px solid #e5e5e0;cursor:pointer;background:#f9f9f6;font-weight:500;transition:all .15s}
.method-tab.active{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.method-content{display:none}
.method-content.active{display:block}

@media(max-width:680px){
  .menu-btn{display:flex}
  .topbar-title{display:block}
  .sidebar{position:fixed;top:0;left:0;bottom:0;z-index:30;transform:translateX(-100%);width:85%;max-width:320px;border-right:none;box-shadow:4px 0 20px rgba(0,0,0,.15)}
  .sidebar.open{transform:translateX(0)}
  .close-sidebar-btn{display:flex}
  .overlay.visible{display:block}
  .section-grid{grid-template-columns:1fr}
  .section-card.full{grid-column:1}
  .macro-row{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>
<body>
<div class="overlay" id="overlay"></div>

<div class="topbar">
  <button class="menu-btn" id="menu-btn">&#9776;</button>
  <span class="topbar-title" id="topbar-title">Recipe Book</span>
</div>

<div class="app">
<div class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <div>
      <h1>Recipe Book</h1>
      <p id="recipe-count">19 recipes</p>
    </div>
    <button class="close-sidebar-btn" id="close-sidebar-btn">&#10005;</button>
  </div>
  <div class="search-box">
    <span class="search-icon">&#128269;</span>
    <input type="text" id="search" placeholder="Search recipes..." autocomplete="off">
  </div>
  <div class="cat-scroll"><div class="cat-tabs" id="cat-tabs"></div></div>
  <div class="recipe-list" id="recipe-list"></div>
</div>

<div class="main" id="main">
  <div id="main-content">
    <div class="empty-state">
      <div class="empty-icon">&#127859;</div>
      <p style="font-size:15px;font-weight:500;color:#444;margin-bottom:4px">Select a recipe</p>
      <p style="font-size:13px">Tap the menu to browse all recipes</p>
    </div>
  </div>
</div>
</div>

<script>
const CATS = ["All","Burgers","Sandwiches","Smoothies","Breakfast","Dessert","Chinese","Italian","Vegetables","Meat","Miscellaneous"];

const recipes = [
  {id:1,name:"Burger Buns",cat:"Burgers",icon:"🍞",
   desc:"Japanese-style buns made with tangzhong. Soft and pillowy, stays fresh longer than standard buns.",
   serves:"8 buns",
   timing:[["Prep","~30 min"],["Proof","2-4 hrs"],["Bake","15-18 min"]],
   macros:{cal:"~220",p:"~6g",c:"~38g",f:"~5g",per:"1 bun"},
   ingredients:[
     {group:"Tangzhong",items:[["2 tbsp","Bread flour"],["2 tbsp","Water"],["4 tbsp","Milk"]]},
     {group:"Dough",items:[["2.5 cups","Bread flour"],["½ cup","Milk"],["1 tbsp","Active dry yeast"],["1 tsp","Sea salt"],["2.5 tbsp","Sugar"],["1 + 1 yolk","Egg"],["3 tbsp","Unsalted butter, softened"]]},
     {group:"Egg Wash",items:[["1","Egg"],["1 tbsp","Milk"]]}
   ],
   steps:[
     {n:"1",title:"Tangzhong",text:"Combine 2 tbsp flour, 2 tbsp water, 4 tbsp milk in a pot. Cook medium heat stirring constantly until a paste (~2-3 min). Cover with plastic wrap directly on surface. Cool completely."},
     {n:"2",title:"Activate yeast",text:"Heat ½ cup milk to 95°F (~25 sec microwave). Mix with yeast. Let sit 8 min until foamy. No foam = dead yeast, restart."},
     {n:"3",title:"Make dough",text:"Mix dry ingredients in stand mixer with dough hook. Add yeast mixture and tangzhong on low. Add egg + yolk. Knead 10 min on medium, gradually adding butter in small pieces. Dough should be smooth and slightly tacky."},
     {n:"4",title:"First proof",text:"Shape into ball, place in oiled bowl, cover with plastic wrap. Proof room temp 1-2 hrs until doubled."},
     {n:"5",title:"Shape + second proof",text:"Punch down. Divide into 8 balls. Place on parchment-lined tray. Cover loosely. Proof 1-2 hrs until puffy."},
     {n:"6",title:"Bake",text:"Brush with egg wash. Bake 375°F for 15-18 min until deep golden. Cool 15 min on wire rack before slicing."}
   ],
   tips:["Do not skip tangzhong — it's what makes these soft","Butter must be room temp","Windowpane test: stretch small piece until light shows through","Sesame seeds: sprinkle after egg wash before baking"],
   tools:["Stand mixer with dough hook","Small pot","Mixing bowls","Plastic wrap","Baking tray","Wire rack"],
   notes:"Room temp airtight 3 days. Freeze individually wrapped 2 months.",
   ref:"https://www.youtube.com/watch?v=gTGSUYMu6Ns"},

  {id:2,name:"Burger Patties",cat:"Burgers",icon:"🥩",
   desc:"80/20 ground beef patties with smoked paprika blend. Covers both cast iron pan and grill methods.",
   serves:"4 patties",
   timing:[["Prep","~10 min"],["Cook","~10-12 min"],["Rest","~5 min"]],
   macros:{cal:"~290",p:"~22g",c:"~0g",f:"~22g",per:"1 patty"},
   ingredients:[
     {group:"Patty Seasoning Blend",items:[["1 lb","Ground beef 80/20"],["2 tsp","Smoked paprika"],["1 tsp","Onion powder"],["1 tsp","Garlic powder"],["½ tsp","Cayenne powder"],["½ tsp","Ground mustard powder"]]},
     {group:"Surface (after forming)",items:[["To taste","Kosher salt"],["To taste","Freshly cracked black pepper"]]},
     {group:"Cooking",items:[["1 tsp","Oil (cast iron method)"],["1 tbsp","Butter (for toasting buns)"]]}
   ],
   steps:[
     {n:"1",title:"Season",text:"Mix smoked paprika, onion powder, garlic powder, cayenne, and mustard powder into beef. Mix gently 10-15 sec — do not overwork."},
     {n:"2",title:"Form",text:"Divide into 4 portions (~4 oz each). Flatten to ¾ inch. Press thumb indent in center to prevent doming. After forming, season outside with kosher salt and freshly cracked pepper only."},
     {n:"3",title:"Cook — see method tabs below",text:"Choose cast iron or grill method."},
     {n:"4",title:"Rest",text:"Wire rack, 3-5 min. Tent with foil to keep warm."},
     {n:"5",title:"Toast buns",text:"Same pan or grill: butter, toast cut-side down 60-90 sec until golden."}
   ],
   tips:["Mix blend INTO the beef, salt and pepper ON the surface after forming","80/20 self-bastes — the fat renders and keeps patties juicy","Never press down on the patty while cooking — squeezes out moisture","Smash style: keep as loose balls and smash flat in the pan immediately on contact"],
   tools:["Cast iron skillet or grill","Slotted spatula","Wire rack","Aluminum foil","Instant read thermometer"],
   cookMethods:{
     "Cast Iron":[
       {t:"Setup",text:"Heat cast iron on medium-high until very hot. Add ~1 tsp oil — just enough to coat."},
       {t:"Cook",text:"Place patties. Do not move for 3-4 min until a deep crust forms and sides begin to brown."},
       {t:"Flip",text:"Flip once. Cook 2-4 min more. Add cheese near end, cover with lid 30-60 sec to melt."},
       {t:"Pros",text:"Superior crust (Maillard reaction), better heat retention, more control, cheese melts easier."},
       {t:"Watch out",text:"Hot spots — rotate pan if needed. Seasoning with paprika/sugar can burn if heat too high. Use medium-high, not screaming high."}
     ],
     "Grill":[
       {t:"Setup",text:"Preheat grill. Set up two zones: direct heat (high) and indirect (no heat below). Oil the patties directly — not the grates."},
       {t:"Sear",text:"Direct heat 2-3 min per side to develop grill marks and crust."},
       {t:"Finish",text:"Move to indirect zone for remaining cook time. Close lid — acts like a convection oven. Prevents seasoning from burning."},
       {t:"Cheese",text:"Add cheese on indirect zone with lid closed 1-2 min."},
       {t:"Pros",text:"Smoky char flavor, better for cooking multiple patties at once."},
       {t:"Watch out",text:"Flare-ups from dripping fat hit the paprika/sugar seasoning and burn it instantly. Move to indirect immediately if flare-up occurs. Two-zone is non-negotiable."}
     ]
   },
   doneness:[["Rare","120-125°F","Red center, very soft"],["Medium Rare","130-135°F","Pink center, juicy"],["Medium","140-145°F","Slight pink, slight resistance"],["Well Done","160°F+","Firm, no pink"]]},

  {id:3,name:"Classic Cheeseburger",cat:"Burgers",icon:"🍔",
   desc:"The standard. Simple and clean — American cheese, ketchup, mustard, pickles. About the quality of the beef.",
   serves:"4 burgers",
   timing:[["Patties","~20 min"],["Toppings","~5 min"],["Assembly","~3 min"]],
   macros:{cal:"~660",p:"~33g",c:"~40g",f:"~38g",per:"1 burger"},
   ingredients:[
     {group:"Patty",items:[["4","Seasoned burger patties (see Burger Patties)"],["4","Burger buns, toasted"]]},
     {group:"Cheese",items:[["1-2 slices","American cheese (or cheddar)"]]},
     {group:"Vegetables",items:[["1-2 leaves","Iceberg or romaine lettuce"],["2-3 slices","Ripe tomato"],["3-4 rings","White or yellow onion"],["4-6 slices","Dill pickle"]]},
     {group:"Sauce",items:[["1 tbsp","Ketchup"],["1 tbsp","Yellow mustard"],["Optional","Mayonnaise"]]}
   ],
   steps:[
     {n:"1",title:"Cook patties",text:"See Burger Patties recipe. Add American cheese near end of cooking — cover pan with lid 30-60 sec to melt."},
     {n:"2",title:"Toast buns",text:"Butter in same pan. Toast cut-side down 60-90 sec until golden brown."},
     {n:"3",title:"Assemble",text:"Bottom bun: ketchup + mustard (+ mayo optional). Layer: lettuce first, tomato, onion, pickles. Place cheesy patty on top. Top bun: ketchup. Press down gently."}
   ],
   tips:["Lettuce on bottom bun — moisture barrier prevents sogginess","American cheese melts best of any cheese — no substitutes for the classic","Caramelized onion variation: cook onion in butter on low 20-25 min for sweeter flavor"],
   tools:["Cast iron or grill","Spatula","Wire rack"]},

  {id:4,name:"Bacon BBQ Burger",cat:"Burgers",icon:"🥓",
   desc:"Rich, smoky, and sweet. Bacon + caramelized onions + cheddar + BBQ sauce. One of the most popular burger combinations.",
   serves:"4 burgers",
   timing:[["Bacon","20 min"],["Onions","25 min"],["Patties","~20 min"],["Assembly","~5 min"]],
   macros:{cal:"~820",p:"~40g",c:"~48g",f:"~47g",per:"1 burger"},
   ingredients:[
     {group:"Patty",items:[["4","Seasoned burger patties (see Burger Patties)"],["4","Burger buns, toasted"]]},
     {group:"Cheese",items:[["1-2 slices","Sharp cheddar or pepper jack"]]},
     {group:"Bacon",items:[["3-4 strips per burger","Thick-cut bacon (12-16 strips total)"]]},
     {group:"Caramelized Onions",items:[["1 medium","Yellow onion, thinly sliced"],["1 tbsp","Butter"],["Pinch","Salt + sugar"]]},
     {group:"Sauce",items:[["1-2 tbsp","BBQ sauce per burger"],["Optional","Mayonnaise on bottom bun"]]},
     {group:"Veg",items:[["1-2 leaves","Romaine"],["2-3 rings","Pickled jalapeño (optional)"]]}
   ],
   steps:[
     {n:"1",title:"Bacon",text:"Lay strips on foil-lined sheet pan. Bake 400°F for 15-18 min until crispy. Drain on paper towels."},
     {n:"2",title:"Caramelized onions",text:"Slice thin. Cook in butter on LOW heat 20-25 min stirring occasionally until deep golden and very sweet. Season with salt and pinch of sugar. Do not rush — high heat makes them bitter."},
     {n:"3",title:"Cook patties",text:"See Burger Patties recipe. Add cheddar near end, melt with lid."},
     {n:"4",title:"Assemble",text:"Bottom bun: thin mayo layer + BBQ sauce. Lettuce. Place cheesy patty. Top with caramelized onions, then bacon strips crossed for coverage. Top bun: BBQ sauce."}
   ],
   tips:["Start bacon in the oven before everything else — it takes longest","Low heat caramelized onions: cannot be rushed, high heat = bitter","Bacon strips crossed = better coverage per bite","Pepper jack instead of cheddar if you want more heat"],
   tools:["Foil-lined sheet pan","Cast iron or grill","Spatula","Small pan for onions"]},

  {id:5,name:"Mushroom Swiss Burger",cat:"Burgers",icon:"🍄",
   desc:"Earthy, savory, and rich. Sauteed cremini mushrooms with Swiss and homemade garlic aioli.",
   serves:"4 burgers",
   timing:[["Aioli","~5 min"],["Mushrooms","~10 min"],["Patties","~20 min"],["Assembly","~5 min"]],
   macros:{cal:"~720",p:"~36g",c:"~41g",f:"~42g",per:"1 burger"},
   ingredients:[
     {group:"Patty",items:[["4","Seasoned burger patties (see Burger Patties)"],["4","Burger buns, toasted"]]},
     {group:"Cheese",items:[["1-2 slices","Swiss cheese"]]},
     {group:"Mushrooms",items:[["8 oz","Cremini or white button mushrooms, sliced"],["1 tbsp","Butter"],["1 clove","Garlic, minced"],["1 tsp","Worcestershire sauce"],["To taste","Salt and black pepper"]]},
     {group:"Garlic Aioli",items:[["3 tbsp","Mayonnaise"],["1 clove","Garlic, minced (or ½ tsp garlic powder)"],["1 tsp","Lemon juice"],["Pinch","Salt"]]},
     {group:"Veg",items:[["1-2 leaves","Butter or romaine lettuce"],["2-3 slices","Tomato"]]}
   ],
   steps:[
     {n:"1",title:"Garlic aioli",text:"Mix mayo, minced garlic, lemon juice, pinch of salt. Refrigerate until ready."},
     {n:"2",title:"Mushrooms",text:"Butter in pan on medium-high. Add mushrooms in single layer — do not stir for 2 min so they brown. Add garlic, stir. Cook until golden, 3-4 min more. Add Worcestershire, stir, cook 1 min. Season."},
     {n:"3",title:"Cook patties",text:"See Burger Patties recipe. Add Swiss near end, melt with lid."},
     {n:"4",title:"Assemble",text:"Bottom bun: generous garlic aioli. Lettuce, tomato. Cheesy patty. Pile of sauteed mushrooms. Top bun: more garlic aioli."}
   ],
   tips:["Don't stir mushrooms for first 2 min — they need to brown not steam","Make aioli in advance — flavor develops as it sits","Be generous with mushrooms — they shrink significantly during cooking","Worcestershire adds depth — don't skip it"],
   tools:["Cast iron or grill","Spatula","Pan for mushrooms","Small bowl for aioli"]},

  {id:6,name:"Fried Egg Sandwich",cat:"Sandwiches",icon:"🥚",
   desc:"Classic egg sandwich with bacon, fresh greens, tomato, and smoky mayo. Built bottom to top.",
   serves:"1 sandwich",
   timing:[["Bacon","20 min"],["Prep","~5 min"],["Cook","~8 min"],["Total","~35 min"]],
   macros:{cal:"~520",p:"~22g",c:"~30g",f:"~35g",per:"1 sandwich"},
   ingredients:[
     {group:"",items:[["1","Egg"],["2 slices","Pork bacon"],["2 slices","Bread (sourdough or brioche recommended)"],["2 tbsp","Butter"],["1 slice","Tomato"],["Handful","Spinach or romaine"],["To taste","Kosher salt + black pepper"],["Optional","1-2 slices cheese"],["Optional","Avocado, sliced"]]},
     {group:"Smoky Mayo",items:[["2 tbsp","Mayo"],["1 tsp","Hot sauce"],["1 tsp","Paprika"]]}
   ],
   steps:[
     {n:"1",title:"Bacon",text:"Lay strips on parchment-lined baking sheet. Bake 400°F for 20 min flipping halfway. Drain on paper towels."},
     {n:"2",title:"Smoky mayo",text:"Mix mayo, hot sauce, paprika. Set aside."},
     {n:"3",title:"Toast bread",text:"Spread butter on bread. Toast cut-side down in pan over medium until golden."},
     {n:"4",title:"Fry egg",text:"Same pan, fry egg. Season with kosher salt and pepper."},
     {n:"5",title:"Assemble (bottom to top)",text:"Sauce → lettuce → tomato → egg → cheese → bacon. Cut in half and serve."}
   ],
   tips:["Baked bacon = hands-off and less splatter","Lettuce on bottom acts as moisture barrier","Sourdough or brioche are the best bread choices","Smoky mayo is the move — ketchup also works"],
   tools:["Baking sheet","Parchment paper","Pan","Butter knife","Paper towels"]},

  {id:7,name:"Penne Bolognese",cat:"Italian",icon:"🍝",
   desc:"Slow-cooked Italian meat sauce. Quick version: 20-25 min simmer. Traditional: 60-120 min.",
   serves:"4",
   timing:[["Prep","~15 min"],["Quick cook","~40 min"],["Traditional","~2.5 hrs"]],
   macros:{cal:"~750",p:"~45g",c:"~78g",f:"~22g",per:"¼ recipe"},
   ingredients:[
     {group:"",items:[["1 lb","Penne or rotini"],["3 tbsp","Olive oil"],["2 cloves","Garlic, minced"],["½","Red bell pepper, diced"],["2 sticks","Celery, diced"],["½","Red onion, diced"],["1 can","Crushed peeled tomatoes"],["1 lb","Ground beef 80/20"],["½ tsp","Salt + black pepper"],["1.5 tbsp","Dried basil"],["¼ cup","Chicken stock (quick) / ½ cup (traditional)"],["1.5 tsp","Red wine vinegar (quick) / 1 tbsp (traditional)"],["To serve","Parmesan + fresh basil"]]}
   ],
   steps:[
     {n:"1",title:"Prep",text:"Mince garlic. Dice pepper, celery, onion to ¼ inch."},

let activecat = "All";
let activeid = null;

function renderCatTabs(){
  document.getElementById("cat-tabs").innerHTML = CATS.map(c=>
    `<button class="cat-tab${c===activecat?' active':''}" data-cat="${c}">${c}</button>`
  ).join("");
}

function setcat(c){
  activecat=c;
  renderCatTabs();
  filterRecipes();
}

function filterRecipes(){
  const q = document.getElementById("search").value.toLowerCase();
  const filtered = recipes.filter(r=>{
    const mc = activecat==="All"||r.cat===activecat;
    const mq = !q||r.name.toLowerCase().includes(q)||r.cat.toLowerCase().includes(q)||r.desc.toLowerCase().includes(q);
    return mc&&mq;
  });
  document.getElementById("recipe-count").textContent = filtered.length+" recipe"+(filtered.length!==1?"s":"");
  document.getElementById("recipe-list").innerHTML = filtered.map(r=>`
    <div class="recipe-item${r.id===activeid?' active':''}" data-recipe-id="${r.id}">
      <div class="recipe-icon">${r.icon}</div>
      <div style="min-width:0">
        <div class="recipe-item-name">${r.name}</div>
        <div class="recipe-item-cat">${r.cat} · ${r.serves}</div>
      </div>
    </div>
  `).join("");
}

function toggle(id){
  const b = document.getElementById("body-"+id);
  const c = document.getElementById("chev-"+id);
  if(b.classList.contains("open")){b.classList.remove("open");c.classList.remove("open");}
  else{b.classList.add("open");c.classList.add("open");}
}

function switchMethod(rid, method){
  document.querySelectorAll('.method-tab[data-rid="'+rid+'"]').forEach(t=>{
    t.classList.toggle("active", t.dataset.method===method);
  });
  document.querySelectorAll('.method-content[data-rid="'+rid+'"]').forEach(c=>{
    c.classList.toggle("active", c.dataset.method===method);
  });
}

// Event delegation for dynamically generated content - Safari PWA safe
document.addEventListener('click', function(e){
  // Section toggles
  const st = e.target.closest('.section-toggle');
  if(st){
    const id = st.dataset.toggleId;
    if(id) toggle(id);
    return;
  }
  // Method tabs
  const mt = e.target.closest('.method-tab');
  if(mt){
    switchMethod(mt.dataset.rid, mt.dataset.method);
    return;
  }
  // Recipe items in sidebar
  const ri = e.target.closest('.recipe-item');
  if(ri && ri.dataset.recipeId){
    showRecipe(parseInt(ri.dataset.recipeId));
    return;
  }
  // Category tabs
  const ct = e.target.closest('.cat-tab');
  if(ct && ct.dataset.cat){
    setcat(ct.dataset.cat);
    return;
  }
});

function openSidebar(){
  document.getElementById("sidebar").classList.add("open");
  document.getElementById("overlay").classList.add("visible");
}
function closeSidebar(){
  document.getElementById("sidebar").classList.remove("open");
  document.getElementById("overlay").classList.remove("visible");
}

function showRecipe(id){
  activeid = id;
  closeSidebar();
  filterRecipes();
  const r = recipes.find(x=>x.id===id);
  if(!r) return;
  document.getElementById("topbar-title").textContent = r.name;

  let h = `<div class="recipe-header">
    <div class="recipe-title">${r.icon} ${r.name}</div>
    <div class="recipe-desc">${r.desc}</div>
    <div class="recipe-meta">
      <div class="meta-pill">Serves <span>&nbsp;${r.serves}</span></div>
      ${r.timing.map(t=>`<div class="meta-pill">${t[0]}<span>&nbsp;${t[1]}</span></div>`).join("")}
    </div>
  </div><div class="section-grid">`;

  // MACROS
  h += `<div class="section-card"><button class="section-toggle" data-toggle-id="mac-${id}">
    <span class="section-toggle-left"><span class="section-toggle-icon">📊</span> Macros</span>
    <span class="chevron" id="chev-mac-${id}">▾</span></button>
    <div class="section-body" id="body-mac-${id}">
      <div class="macro-row">
        <div class="macro-cell"><div class="macro-val">${r.macros.cal}</div><div class="macro-lbl">Cal</div></div>
        <div class="macro-cell"><div class="macro-val">${r.macros.p}</div><div class="macro-lbl">Protein</div></div>
        <div class="macro-cell"><div class="macro-val">${r.macros.c}</div><div class="macro-lbl">Carbs</div></div>
        <div class="macro-cell"><div class="macro-val">${r.macros.f}</div><div class="macro-lbl">Fat</div></div>
      </div>
      <div style="font-size:11px;color:#888;margin-top:8px">Per ${r.macros.per}</div>
    </div></div>`;

  // INGREDIENTS
  h += `<div class="section-card"><button class="section-toggle" data-toggle-id="ing-${id}">
    <span class="section-toggle-left"><span class="section-toggle-icon">🧾</span> Ingredients</span>
    <span class="chevron" id="chev-ing-${id}">▾</span></button>
    <div class="section-body" id="body-ing-${id}">
    <table class="ing-table"><thead><tr><th>Amount</th><th>Ingredient</th></tr></thead><tbody>`;
  for(const g of r.ingredients){
    if(g.group) h+=`<tr><td colspan="2" class="ing-group">${g.group}</td></tr>`;
    for(const [a,i] of g.items) h+=`<tr><td>${a}</td><td>${i}</td></tr>`;
  }
  h+=`</tbody></table></div></div>`;

  // PROCEDURE
  h += `<div class="section-card full"><button class="section-toggle" data-toggle-id="steps-${id}">
